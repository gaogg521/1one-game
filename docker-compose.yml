services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/app.sqlite
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_USER_AGENT: ${OPENAI_USER_AGENT:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
