services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:/app/data/app.sqlite
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_MODEL_FALLBACKS: ${OPENAI_MODEL_FALLBACKS:-gemini-3.1-pro-preview}
      NOVEL_LLM_PRIMARY: ${NOVEL_LLM_PRIMARY:-deepseek-v4-pro}
      NOVEL_LLM_FALLBACK: ${NOVEL_LLM_FALLBACK:-doubao-seed-2-pro}
      NOVEL_LLM_TIMEOUT_MS: ${NOVEL_LLM_TIMEOUT_MS:-600000}
      NOVEL_LLM_MAX_OUTPUT_TOKENS: ${NOVEL_LLM_MAX_OUTPUT_TOKENS:-65536}
      NOVEL_MIN_ACCEPT_CHARS: ${NOVEL_MIN_ACCEPT_CHARS:-900}
      LLM_WITH_TIMEOUT_MAX_MS: ${LLM_WITH_TIMEOUT_MAX_MS:-600000}
      IMAGE_GEN_OPENAI_MODEL: ${IMAGE_GEN_OPENAI_MODEL:-gpt-image-2}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-3.1-flash-image-preview}
      IMAGE_GEN_SIZE: ${IMAGE_GEN_SIZE:-1024x1024}
      OPENAI_EXTRA_HEADERS_JSON: ${OPENAI_EXTRA_HEADERS_JSON:-}
      OPENAI_USER_AGENT: ${OPENAI_USER_AGENT:-}
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
