services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${OPERONE_PORT:-6666}:6666"
    env_file:
      - .env
    environment:
      PORT: "6666"
      NODE_ENV: production
      DATABASE_URL: file:/app/data/prod.db
    volumes:
      - operone_data:/app/data
      - operone_public:/app/public/covers

volumes:
  operone_data:
  operone_public:
