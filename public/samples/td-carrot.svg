  <rect x="92" y="318" width="48" height="48" rx="10" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
  <rect x="260" y="302" width="48" height="48" rx="10" fill="#67e8f9" stroke="#0891b2" stroke-width="2"/>
  <circle cx="118" cy="352" r="10" fill="#fde68a"/>
