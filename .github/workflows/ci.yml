name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate & migrate (SQLite)
        env:
          DATABASE_URL: file:./ci.sqlite
        run: npx prisma migrate deploy && npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: file:./ci.sqlite
        run: npm run build
