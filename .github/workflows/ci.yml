name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Orchestration smoke (mock spec + lint)
        run: npm run qa:orch-smoke

      - name: Director & refinement unit smokes
        run: npm run qa:director-spec && npm run qa:refinement-log && npm run qa:template-matrix && npm run qa:comic-storyboard-resilience && npm run qa:database-url && npm run qa:comic-director-pipeline && npm run qa:competitor-clone-checks-offline

      - name: Astrocade architecture parity (offline)
        run: |
          npm run qa:architecture-parity
          npm run qa:spec-canonical-parity
          npm run qa:user-journey-parity
          npm run qa:literary-user-journey
          npm run qa:platform-user-journey
          npm run qa:comic-novel-product-rules
          npm run qa:prompt-profile-infer
          npm run qa:agentic-sandbox-mock
          npm run qa:godot:runtime-profile
          npm run qa:godot:juice-gate
          npm run qa:astrocade-competitor-matrix

      - name: Multilingual locale regression (offline)
        run: npm run qa:multilingual-locale && npm run qa:novel-locale

      - name: Runtime config admin smoke (offline DB)
        run: npm run qa:runtime-config-admin

  godot-export:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache Godot engine & export templates
        uses: actions/cache@v4
        with:
          path: |
            tools/godot
            ~/.local/share/godot/export_templates/4.4.1.stable
          key: godot-4.4.1-linux-${{ hashFiles('scripts/godot-install*.sh') }}
          restore-keys: |
            godot-4.4.1-linux-

      - name: Install Godot (engine + Web export templates)
        run: bash scripts/godot-install-ci.sh

      - name: Install npm deps
        run: npm ci

      - name: Godot Web export matrix (6 templates)
        env:
          GODOT_BIN: ${{ github.workspace }}/tools/godot/Godot_v4.4.1-stable_linux.x86_64
        run: npm run qa:godot-export:matrix

  bundle-e2e:
    runs-on: ubuntu-latest
    needs: godot-export
    env:
      DATABASE_URL: file:./ci.sqlite
      SUPER_ADMIN_SECRET: e2e-super-admin-secret
      RUNTIME_CONFIG_SECRET: e2e-runtime-config-secret
      GODOT_BIN: ${{ github.workspace }}/tools/godot/Godot_v4.4.1-stable_linux.x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma migrate & generate (SQLite)
        run: npx prisma migrate deploy && npx prisma generate

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Cache Godot engine & export templates
        uses: actions/cache@v4
        with:
          path: |
            tools/godot
            ~/.local/share/godot/export_templates/4.4.1.stable
          key: godot-4.4.1-linux-${{ hashFiles('scripts/godot-install*.sh') }}
          restore-keys: |
            godot-4.4.1-linux-

      - name: Install Godot (for E2E wasm / iframe)
        run: bash scripts/godot-install-ci.sh

      - name: E2E smoke (production server, excl. Godot + platform-user-journey)
        env:
          CI: true
          PW_START: "1"
          PW_BUNDLE_E2E: "1"
        run: npm run test:e2e:bundle

      - name: Admin runtime config E2E (visual + super_admin tab)
        env:
          CI: true
          PW_START: "1"
        run: npm run test:e2e:admin-runtime-config

      - name: Platform PM user journey E2E (zh + en + ms + th + zh-Hant)
        env:
          CI: true
          PW_EXTERNAL: "1"
        run: |
          npm run start &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8888/api/health >/dev/null; then break; fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8888/api/health
          npm run seed:samples
          npm run test:e2e:platform-user-journey

      - name: /en/ path acceptance (production server)
        env:
          CI: true
          PW_EXTERNAL: "1"
        run: |
          npm run start &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8888/api/health >/dev/null; then break; fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8888/api/health
          npm run qa:seed-en-fixtures
          npm run qa:en-path

      - name: Astrocade competitor gates (E2E + matrix report)
        env:
          CI: true
          PW_EXTERNAL: "1"
          COMPETITOR_PARITY_STRICT: "1"
        run: |
          npm run start &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8888/api/health >/dev/null; then break; fi
            sleep 2
          done
          curl -sf http://127.0.0.1:8888/api/health
          npm run qa:seed-en-fixtures
          npm run seed:samples
          npm run qa:competitor-gates
          npm run qa:astrocade-competitor-matrix

      - name: Upload competitor parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: competitor-parity-pr-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            qa-output/competitor-gates.json
            qa-output/competitor-parity/REPORT.md
            qa-output/competitor-parity/summary.json
            qa-output/competitor-parity/prompt/**
            qa-output/competitor-parity/clone/**
            qa-output/astrocade-competitor-matrix.md
            qa-output/godot-matrix/REPORT.md
            qa-output/godot-matrix/summary.json
            qa-output/regression-archive/LATEST.json
            qa-output/regression-archive/**/INDEX.md
