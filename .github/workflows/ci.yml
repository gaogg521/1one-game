name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Orchestration smoke (mock spec + lint)
        run: npm run qa:orch-smoke

      - name: Director & refinement unit smokes
        run: npm run qa:director-spec && npm run qa:refinement-log && npm run qa:template-matrix

  bundle-e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.sqlite
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma migrate & generate (SQLite)
        run: npx prisma migrate deploy && npx prisma generate

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (production server)
        env:
          CI: true
          PW_START: "1"
        run: npm run test:e2e
