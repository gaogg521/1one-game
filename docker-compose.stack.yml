# Phase 4 生产栈：Postgres + Redis + MinIO(S3) + Web
# 用法：cp .env.stack.example .env.stack && docker compose -f docker-compose.stack.yml --env-file .env.stack up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oneone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneone_dev}
      POSTGRES_DB: oneone
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneone"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  web:
    build: .
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: "8888"
      DATABASE_URL: postgresql://oneone:${POSTGRES_PASSWORD:-oneone_dev}@postgres:5432/oneone
      REDIS_URL: redis://redis:6379
      STORAGE_MODE: s3
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_BUCKET: oneone-assets
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_S3_PUBLIC_URL: http://localhost:9000/oneone-assets
      STORAGE_S3_REGION: us-east-1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      PAYMENT_DEV_MODE: ${PAYMENT_DEV_MODE:-0}
      OAUTH_DEV_ENABLED: ${OAUTH_DEV_ENABLED:-0}

volumes:
  pg_data:
  redis_data:
  minio_data:
